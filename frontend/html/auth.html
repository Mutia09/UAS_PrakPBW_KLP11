<div class="auth-card">
  <div class="auth-logo">
    <div class="auth-logo-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#27500A" stroke-width="2">
        <circle cx="12" cy="8" r="4" />
        <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" />
        <path d="M12 8v4M10 10h4" />
      </svg>
    </div>
    <div>
      <div class="auth-title">StuntCheck</div>
      <div class="auth-sub">Deteksi stunting berbasis genetik</div>
    </div>
  </div>
  <div class="auth-tabs">
    <div class="auth-tab active" onclick="switchAuth('login')">Masuk</div>
    <div class="auth-tab" onclick="switchAuth('register')">Daftar</div>
  </div>
  <div id="loginForm">
    <div class="form-group">
      <label class="form-label">Email</label
      ><input
        type="email"
        class="form-input"
        id="loginEmail"
        placeholder="contoh@email.com"
        onkeydown="if(event.key==='Enter') doLogin()"
      />
    </div>
    <div class="form-group">
      <label class="form-label">Kata sandi</label
      ><input
        type="password"
        class="form-input"
        id="loginPass"
        placeholder="••••••••"
        onkeydown="if(event.key==='Enter') doLogin()"
      />
    </div>
    <button class="btn-primary" onclick="doLogin()">Masuk</button>
  </div>
  <div id="registerForm" style="display: none">
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Nama depan</label
        ><input
          type="text"
          class="form-input"
          id="regFirst"
          placeholder="Ana"
        />
      </div>
      <div class="form-group">
        <label class="form-label">Nama belakang</label
        ><input
          type="text"
          class="form-input"
          id="regLast"
          placeholder="Putri"
        />
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Email</label
      ><input
        type="email"
        class="form-input"
        id="regEmail"
        placeholder="contoh@email.com"
      />
    </div>
    <div class="form-group">
      <label class="form-label">Kata sandi</label
      ><input
        type="password"
        class="form-input"
        id="regPass"
        placeholder="Min. 8 karakter"
        onkeydown="if(event.key==='Enter') doRegister()"
      />
    </div>
    <button class="btn-primary" onclick="doRegister()">Buat akun</button>
  </div>
</div>
