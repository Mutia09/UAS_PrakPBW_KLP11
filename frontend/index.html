<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>StuntCheck</title>
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/pages/auth.css" />
    <link rel="stylesheet" href="css/pages/dashboard.css" />
    <link rel="stylesheet" href="css/pages/cek.css" />
    <link rel="stylesheet" href="css/pages/child.css" />
    <link rel="stylesheet" href="css/pages/profil.css" />
    <link rel="stylesheet" href="css/responsive.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  </head>
  <body>
    <div class="auth-wrap" id="authWrap"></div>

    <div class="app" id="appWrap" style="display: none">
      <aside class="sidebar" id="sidebar">
        <div class="sb-brand">
          <div class="sb-logo">
            <div class="sb-icon">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="#173404"
                stroke-width="2.2"
              >
                <circle cx="12" cy="8" r="4" />
                <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" />
              </svg>
            </div>
            <div>
              <div class="sb-name">StuntCheck</div>
            </div>
          </div>
        </div>
        <nav class="sb-nav">
          <div class="nav-sec">Utama</div>
          <div
            class="nav-item active"
            onclick="nav('dashboard')"
            id="nav-dashboard"
          >
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <rect x="3" y="3" width="7" height="7" rx="1" />
              <rect x="14" y="3" width="7" height="7" rx="1" />
              <rect x="3" y="14" width="7" height="7" rx="1" />
              <rect x="14" y="14" width="7" height="7" rx="1" /></svg
            >Semua Anak
          </div>
          <div class="nav-item" onclick="nav('cek')" id="nav-cek">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path
                d="M9 12h6M9 16h6M9 8h6M5 3h14a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z"
              /></svg
            >Cek Stunting Baru
          </div>
          <div class="nav-sec">Dashboard Anak</div>
          <div id="childNavList"></div>
          <div class="nav-sec">Akun</div>
          <div class="nav-item" onclick="nav('profil')" id="nav-profil">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <circle cx="12" cy="8" r="4" />
              <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" /></svg
            >Profil
          </div>
          <div class="nav-item" onclick="doLogout()">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path
                d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"
              /></svg
            >Keluar
          </div>
        </nav>
        <div class="sb-footer">
          <div class="user-chip">
            <div class="avatar" id="sidebarAvatar">AN</div>
            <div>
              <div class="user-name" id="sidebarName">Ana N.</div>
              <div class="user-email" id="sidebarEmail"></div>
            </div>
          </div>
        </div>
      </aside>

      <button class="mob-toggle" onclick="toggleSidebar()">
        <svg
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="#fff"
          stroke-width="2.5"
        >
          <path d="M3 12h18M3 6h18M3 18h18" />
        </svg>
      </button>
      <div class="mob-overlay" id="mobOverlay" onclick="toggleSidebar()"></div>

      <div class="main">
        <div class="page active" id="page-dashboard"></div>
        <div class="page" id="page-cek"></div>
        <div class="page" id="page-child"></div>
        <div class="page" id="page-profil"></div>
      </div>
    </div>

    <div id="modalsMount"></div>

    <script src="js/core/state.js"></script>
    <script src="js/core/calc.js"></script>
    <script src="js/core/helpers.js"></script>
    <script src="js/core/api.js"></script>
    <script src="js/core/data.js"></script>
    <script src="js/pages/auth.js"></script>
    <script src="js/pages/dashboard.js"></script>
    <script src="js/pages/cek.js"></script>
    <script src="js/pages/child.js"></script>
    <script src="js/pages/profil.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
